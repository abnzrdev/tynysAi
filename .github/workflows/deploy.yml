name: TynysAI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality-check]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: ci_local_password
          POSTGRES_DB: tynysdb
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U admin -d tynysdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Push DB schema
        run: npx drizzle-kit push
        env:
          DATABASE_URL: postgresql://admin:ci_local_password@localhost:5433/tynysdb
          DB_URL: postgresql://admin:ci_local_password@localhost:5433/tynysdb

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://admin:ci_local_password@localhost:5433/tynysdb
          DB_URL: postgresql://admin:ci_local_password@localhost:5433/tynysdb
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci_nextauth_secret_for_build_only

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [quality-check]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Test Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: tynys-ai:test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -e
          [ -n "${{ secrets.SSH_HOST }}" ] || { echo "Missing SSH_HOST"; exit 1; }
          [ -n "${{ secrets.SSH_USER }}" ] || { echo "Missing SSH_USER"; exit 1; }
          [ -n "${{ secrets.SSH_KEY }}" ] || { echo "Missing SSH_KEY"; exit 1; }
          [ -n "${{ secrets.POSTGRES_PASSWORD }}" ] || { echo "Missing POSTGRES_PASSWORD"; exit 1; }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            cd /home/administrator/tynysAi

            PREV_COMMIT=$(git rev-parse HEAD)
            TARGET_COMMIT="${{ github.sha }}"
            RELEASE_TAG="${{ github.sha }}-${{ github.run_number }}"
            APP_PORT="${APP_PORT:-3010}"
            NEXTAUTH_URL_VALUE="${{ secrets.NEXTAUTH_URL }}"
            POSTGRES_PASSWORD_VALUE="${{ secrets.POSTGRES_PASSWORD }}"
            NEXTAUTH_SECRET_VALUE="${{ secrets.NEXTAUTH_SECRET }}"
            IOT_DEVICE_SECRET_VALUE="${{ secrets.IOT_DEVICE_SECRET }}"

            if [ -z "$POSTGRES_PASSWORD_VALUE" ]; then
              echo "Missing POSTGRES_PASSWORD secret"
              exit 1
            fi

            if [ -z "$NEXTAUTH_SECRET_VALUE" ]; then
              echo "Warning: NEXTAUTH_SECRET secret missing, using fallback value"
              NEXTAUTH_SECRET_VALUE="replace-this-nextauth-secret-32-plus-chars"
            fi

            if [ -z "$IOT_DEVICE_SECRET_VALUE" ]; then
              echo "Warning: IOT_DEVICE_SECRET secret missing, using fallback value"
              IOT_DEVICE_SECRET_VALUE="replace-this-iot-secret"
            fi

            if [ -z "$NEXTAUTH_URL_VALUE" ]; then
              NEXTAUTH_URL_VALUE="http://127.0.0.1:${APP_PORT}"
            fi

            rollback() {
              echo "==> Rollback started to $PREV_COMMIT"
              git reset --hard "$PREV_COMMIT"
              docker compose -f docker-compose.prod.yml up -d --build --remove-orphans || true
              docker compose -f docker-compose.prod.yml ps || true
            }

            echo "==> Pulling target commit..."
            git fetch origin
            git reset --hard "$TARGET_COMMIT"

            echo "==> Writing .env from GitHub secrets..."
            printf '%s\n' \
              "NODE_ENV=production" \
              "POSTGRES_PASSWORD=${POSTGRES_PASSWORD_VALUE}" \
              "NEXTAUTH_SECRET=${NEXTAUTH_SECRET_VALUE}" \
              "IOT_DEVICE_SECRET=${IOT_DEVICE_SECRET_VALUE}" \
              "APP_PORT=${APP_PORT}" \
              "NEXTAUTH_URL=${NEXTAUTH_URL_VALUE}" \
              "RELEASE_TAG=${RELEASE_TAG}" > .env

            echo "==> Writing .env.local for server-side scripts..."
            umask 077
            printf '%s\n' \
              "DATABASE_URL=postgresql://admin:${POSTGRES_PASSWORD_VALUE}@tynys-postgres:5432/tynysdb" \
              "DB_URL=postgresql://admin:${POSTGRES_PASSWORD_VALUE}@tynys-postgres:5432/tynysdb" \
              "NEXTAUTH_SECRET=${NEXTAUTH_SECRET_VALUE}" \
              "IOT_DEVICE_SECRET=${IOT_DEVICE_SECRET_VALUE}" > .env.local

            echo "==> Deploying release: $RELEASE_TAG"

            echo "==> Building Docker image..."
            BUILD_OK=0
            for i in 1 2 3; do
              if docker compose -f docker-compose.prod.yml build --no-cache; then
                BUILD_OK=1
                break
              fi
              echo "Docker build attempt $i failed, retrying in 15s..."
              sleep 15
            done

            if [ "$BUILD_OK" -ne 1 ]; then
              echo "Docker build failed after 3 attempts"
              rollback
              exit 1
            fi

            echo "==> Starting containers..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Ensuring Postgres 'admin' password matches .env (idempotent)"
            PASSWORD_SYNCED=0
            for i in 1 2 3; do
              # Most environments use 'admin' as the bootstrap superuser.
              if docker compose -f docker-compose.prod.yml exec -T postgres psql -U admin -d postgres -c "ALTER USER admin WITH PASSWORD '${POSTGRES_PASSWORD_VALUE}';"; then
                echo "Postgres admin password ensured"
                PASSWORD_SYNCED=1
                break
              fi

              # Fallback for environments where 'postgres' superuser exists.
              if docker compose -f docker-compose.prod.yml exec -T postgres psql -U postgres -d postgres -c "ALTER USER admin WITH PASSWORD '${POSTGRES_PASSWORD_VALUE}';"; then
                echo "Postgres admin password ensured via postgres role"
                PASSWORD_SYNCED=1
                break
              fi

              echo "Attempt $i to set admin password failed, retrying in 5s..."
              sleep 5
            done

            if [ "$PASSWORD_SYNCED" -ne 1 ]; then
              echo "Failed to synchronize Postgres admin password"
              rollback
              exit 1
            fi

            echo "==> Running migrations..."
            if ! docker compose -f docker-compose.prod.yml exec -T app npm run migrate; then
              echo "Migration failed"
              rollback
              exit 1
            fi

            echo "==> Running seed in app container..."
            if ! docker compose -f docker-compose.prod.yml exec -T \
              -e DATABASE_URL="postgresql://admin:${POSTGRES_PASSWORD_VALUE}@tynys-postgres:5432/tynysdb" \
              -e DB_URL="postgresql://admin:${POSTGRES_PASSWORD_VALUE}@tynys-postgres:5432/tynysdb" \
              app npm run seed; then
              echo "Seed failed"
              rollback
              exit 1
            fi

            echo "==> Health check (up to 120 seconds)..."
            for i in $(seq 1 24); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${APP_PORT}/" || true)
              [ -z "$STATUS" ] && STATUS="000"
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ]; then
                echo "Deploy successful! HTTP $STATUS"
                docker compose -f docker-compose.prod.yml ps
                exit 0
              fi
              echo "Attempt $i/24 - HTTP $STATUS, waiting 5s..."
              sleep 5
            done

            echo "Health check failed. Dumping logs and rolling back..."
            docker compose -f docker-compose.prod.yml logs --tail=80 || true
            rollback
            exit 1

      - name: Clean up old Docker images
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            docker image prune -af --filter "until=168h"
            docker builder prune -f --filter "until=168h"
